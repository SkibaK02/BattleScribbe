# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true        # automatyczne wstrzykiwanie zależności
        autoconfigure: true   # automatyczne tagowanie (commands, event subscribers itd.)

    # automatyczna rejestracja klas z src/
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Tests/'
            - '../src/Kernel.php'

